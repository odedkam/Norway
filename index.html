        // לוגיקה טכנית (Weather, Sidebar, Storage) נשמרת מהקוד המקורי שלך
        let currentExchangeRate = 0.34;
        const storageKey = id => `norway26-day-${id}`;

        function updateBudgetHeader() {
            const totalNok = trip.reduce((s, d) => s + (d.totalNok || 0), 0);
            const totalIls = Math.round(totalNok * currentExchangeRate);
            document.getElementById('budget-nok-total').textContent = totalNok.toLocaleString() + ' NOK';
            document.getElementById('budget-ils-total').textContent = '≈ ₪' + totalIls.toLocaleString();
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '<span class="sidebar-label">14 ימים · אוגוסט 2026</span>';
            trip.forEach(day => {
                const btn = document.createElement('button');
                btn.className = 'day-btn';
                btn.id = 'btn-' + day.id;
                btn.innerHTML = `
                    <div class="day-num-badge">${day.id}</div>
                    <div class="day-info">
                        <div class="day-date">${day.date}</div>
                        <div class="day-title-text">${day.title}</div>
                    </div>
                `;
                btn.onclick = () => loadDay(day.id);
                sidebar.appendChild(btn);
            });
        }

        function loadDay(id) {
            const d = trip.find(x => x.id === id);
            const content = document.getElementById('content');
            
            // עדכון המפות עם התיקון שהצעתי
            const encodedMap = encodeURIComponent(d.map);
            const mapEmbedUrl = `https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=${encodedMap}`; // כאן השתמש ב-URL המתוקן מהקוד המקורי שלך
            const realEmbedUrl = `https://maps.google.com/maps?q=${encodedMap}&t=&z=13&ie=UTF8&iwloc=&output=embed`;

            let html = `
                <div class="day-header fade-up">
                    <h2 class="day-main-title">${d.id}. ${d.title}</h2>
                    <div class="tags-row">
                        <span class="tag tag-stay">🏠 ${d.stay}</span>
                        <span class="tag tag-drive">🚗 ${d.km} ק״מ</span>
                    </div>
                </div>
                <div class="cards-grid">
                    <div class="info-card">
                        <div class="card-text"><strong>יומן דרכים:</strong> ${d.drive}</div>
                    </div>
                    <div class="info-card">
                        <div class="card-text"><strong>אטרקציה:</strong> ${d.main}</div>
                    </div>
                    <div class="info-card card-wide">
                        <div class="card-text"><strong>בנות (4 ו-8):</strong> ${d.kids}</div>
                    </div>
                </div>
                <div class="cost-card">
                    <div class="card-text">💰 <strong>עלויות:</strong> ${d.totalNok} NOK</div>
                </div>
                <div class="map-card" style="height:300px; border-radius:16px; overflow:hidden;">
                    <iframe width="100%" height="100%" frameborder="0" src="${realEmbedUrl}"></iframe>
                </div>
            `;
            content.innerHTML = html;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+id).classList.add('active');
        }

        // איתחול
        window.onload = () => {
            renderSidebar();
            loadDay(1);
            updateBudgetHeader();
        }
