<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>נורווגיה 2026 — המסע המשפחתי</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fjord: #0a1628; --deep: #0d1f3c; --midnight: #112244;
            --glacier: #a8d8ea; --ice: #dff0f7; --aurora-g: #00c9a7; --aurora-b: #4facfe;
            --white: #f8f9fa; --muted: rgba(168,216,234,0.55);
            --border: rgba(168,216,234,0.15); --card-bg: rgba(17,34,68,0.75);
            --sidebar-w: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Heebo', sans-serif; background-color: var(--fjord); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 70px; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); z-index: 100; flex-shrink: 0; }
        .brand-title { font-family: 'Playfair Display', serif; font-size: 1.2em; color: var(--white); }
        .header-budget { text-align: left; }
        .budget-val { color: var(--aurora-g); font-weight: 700; font-size: 0.9em; }

        /* Main Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar (Desktop) */
        .sidebar { width: var(--sidebar-w); overflow-y: auto; background: rgba(7,18,33,0.4); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 10px 0; }
        .day-btn { display: flex; align-items: center; gap: 12px; padding: 15px 20px; background: transparent; border: none; color: var(--white); cursor: pointer; text-align: right; border-right: 3px solid transparent; transition: 0.2s; }
        .day-btn.active { background: rgba(0,201,167,0.1); border-right-color: var(--aurora-g); color: var(--aurora-g); }
        .day-num { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--muted); display: flex; align-items: center; justify-content: center; font-size: 0.8em; }
        .active .day-num { border-color: var(--aurora-g); }

        /* Content Area */
        .content { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .day-main-title { font-family: 'Playfair Display', serif; font-size: 2em; margin-bottom: 5px; }
        
        /* Cards */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .info-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; line-height: 1.6; }
        .card-label { font-size: 0.7em; text-transform: uppercase; color: var(--aurora-b); letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .card-wide { grid-column: 1 / -1; border-top: 2px solid var(--aurora-g); }

        /* Map & Weather */
        .map-container { width: 100%; height: 250px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); margin-top: 10px; }
        .weather-strip { background: rgba(79,172,254,0.1); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; }

        /* Responsive - Mobile Only */
        @media (max-width: 860px) {
            .main-container { flex-direction: column; }
            .sidebar { 
                width: 100%; height: 85px; flex-direction: row; 
                overflow-x: auto; overflow-y: hidden; 
                white-space: nowrap; border-left: none; border-bottom: 1px solid var(--border);
                padding: 10px; scroll-snap-type: x proximity;
            }
            .day-btn { 
                flex-direction: column; min-width: 80px; padding: 8px; 
                border-right: none; border-bottom: 3px solid transparent; 
                scroll-snap-align: center;
            }
            .day-btn.active { border-bottom-color: var(--aurora-g); border-right-color: transparent; }
            .day-info { display: none; } /* במובייל רואים רק מספר ותאריך קטן */
            .day-btn::after { content: attr(data-date); font-size: 0.6em; color: var(--muted); margin-top: 4px; }
            .content { padding: 15px; }
            .day-main-title { font-size: 1.5em; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <span style="font-size: 1.5em;">🇳🇴</span>
            <span class="brand-title">נורווגיה 2026</span>
        </div>
        <div class="header-budget">
            <div id="budget-nok-total" class="budget-val">—</div>
            <div id="budget-ils-total" style="font-size: 0.7em; color: var(--muted);"></div>
        </div>
    </header>

    <div class="main-container">
        <nav class="sidebar" id="sidebar"></nav>
        <main class="content" id="content">
            <div class="empty-state">טוען מסע...</div>
        </main>
    </div>

    <script>
        const trip = [
            { id:1, date:"12/08", stay:"אוסלו", title:"נחיתה באוסלו", km: 50,
              drive:"נחיתה ב-Gardermoen והגעה לדירת ה-Airbnb ב-Rostockgata 82 (אזור ה-Barcode).",
              main:"גג בית האופרה וטיול לאורך קו המים המודרני.",
              kids:"ריצה על גג האופרה המשופע וביקור בספריית Deichman.",
              map:"Rostockgata 82, Oslo", cost: 460 },
            { id:2, date:"13/08", stay:"אוסלו", title:"פארק ויגילנד ומוזיאון פראם", km: 0,
              drive:"שימוש בתחבורה ציבורית (חשמלית ומעבורת עירונית).",
              main:"פארק הפסלים Vigeland ומוזיאון ספינות הקוטב Fram.",
              kids:"טיפוס על הספינה המקורית במוזיאון Fram.",
              map:"Vigeland Park, Oslo", cost: 242 },
            { id:3, date:"14/08", stay:"ברגן", title:"הרכבת לברגן", km: 480,
              drive:"נסיעה ברכבת ה-Bergensbanen מאוסלו לברגן (כ-7 שעות).",
              main:"נופי רמת הארדנגרווידה המדהימים מהחלון.",
              kids:"קרון המשפחה (Familie) ברכבת עם אזור המשחקים.",
              map:"Bergen Station", cost: 1600 },
            { id:4, date:"15/08", stay:"ברגן", title:"בריגן והר פלויין", km: 10,
              drive:"איסוף רכב שכור בברגן וסיור בנמל ההיסטורי.",
              main:"עלייה בפוניקולר לתצפית מהר Fløyen.",
              kids:"יער הטרולים וגן השעשועים בפסגת ההר.",
              map:"Fløibanen", cost: 440 },
            { id:5, date:"16/08", stay:"ווס", title:"תצפית Stegastein", km: 140,
              drive:"נסיעה מווס דרך Aurland לעבר תצפית Stegastein המרהיבה.",
              main:"מרפסת התצפית התלויה 650 מטר מעל הפיורד.",
              kids:"מבט דרך הזכוכית בקצה המרפסת.",
              map:"Stegastein Viewpoint", cost: 100 },
            { id:6, date:"17/08", stay:"ווס", title:"רכבת פלאם", km: 120,
              drive:"נסיעה לפלאם וחזרה לווס.",
              main:"שייט/רכבת פלאם (Flåmsbana).",
              kids:"מפל Kjosfossen המרשים.",
              map:"Flåm", cost: 1700 },
            { id:7, date:"18/08", stay:"אולדן", title:"בקתת Fremsteteigen", km: 210,
              drive:"נסיעה צפונה. שימו לב לקרחון Bøyabreen שצץ מימין ביציאה ממנהרת Fjærland.",
              main:"התמקמות בבקתת ה-Airbnb של Ketil באולדן.",
              kids:"משחקים בטבע סביב הבקתה מול הפיורד.",
              map:"Fremsteteigen, Olden", cost: 300 },
            { id:8, date:"19/08", stay:"אולדן", title:"קרחון בריקסדל", km: 40,
              drive:"נסיעה לאורך אגם Oldevatnet הטורקיזי.",
              main:"קרחון Briksdal ונסיעה ברכבי ה'טרול'.",
              kids:"הנסיעה הקופצנית ברכבי הבאגי לקרחון.",
              map:"Briksdalsbreen", cost: 600 },
            { id:9, date:"20/08", stay:"וולדה", title:"הדירה על המים", km: 110,
              drive:"נסיעה לוולדה והתמקמות ב-Sjøbuda (Hamnegata 8).",
              main:"דירה מרהיבה על קו המים של הפיורד.",
              kids:"צפייה בסירות ישירות מחלון הסלון.",
              map:"Hamnegata 8, Volda", cost: 50 },
            { id:10, date:"21/08", stay:"וולדה", title:"פיורד גייראנגר", km: 160,
              drive:"נסיעה להלסילט (Hellesylt) ולקיחת מעבורת תיירותית.",
              main:"שייט בפיורד גייראנגר מול 'שבע האחיות'.",
              kids:"לספור את המפלים ולחפש את 'המחזר'.",
              map:"Geirangerfjord", cost: 1200 },
            { id:11, date:"22/08", stay:"וולדה", title:"אקווריום אולסונד", km: 140,
              drive:"נסיעה לעיר האר-נובו אולסונד.",
              main:"האקווריום האטלנטי Atlanterhavsparken.",
              kids:"האכלת פינגווינים וכלבי ים.",
              map:"Atlanterhavsparken", cost: 500 },
            { id:12, date:"23/08", stay:"וולדה", title:"יום ראשון רגוע", km: 0,
              drive:"מנוחה בוולדה (שימו לב: הסופרים סגורים!).",
              main:"טיול לאגם Røtevatnet מעל העיירה.",
              kids:"איסוף אוכמניות ומשחקים מקומיים.",
              map:"Volda", cost: 100 },
            { id:13, date:"24/08", stay:"וולדה", title:"טבע ונוף מקומי", km: 30,
              drive:"נסיעה קצרה לתצפיות סביב וולדה.",
              main:"סיכום הטיול בטבע הנורווגי.",
              kids:"זמן חופשי ומשחקים.",
              map:"Volda", cost: 150 },
            { id:14, date:"25/08", stay:"חזרה", title:"נסיעה לברגן וטיסה", km: 280,
              drive:"נסיעה ארוכה דרומה על ה-E39 לשדה התעופה בברגן.",
              main:"פרידה מהפיורדים דרך המעבורות בדרך.",
              kids:"צפייה בתמונות וסיכומים במטוס.",
              map:"Bergen Airport", cost: 800 }
        ];

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            trip.forEach(day => {
                const btn = document.createElement('button');
                btn.className = 'day-btn';
                btn.id = 'btn-' + day.id;
                btn.setAttribute('data-date', day.date);
                btn.innerHTML = `
                    <div class="day-num">${day.id}</div>
                    <div class="day-info">
                        <div style="font-size: 0.7em; opacity: 0.6;">${day.date}</div>
                        <div style="font-size: 0.85em; font-weight: 700;">${day.title}</div>
                    </div>
                `;
                btn.onclick = () => {
                    loadDay(day.id);
                    if (window.innerWidth <= 860) {
                        btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                    }
                };
                sidebar.appendChild(btn);
            });
        }

        function loadDay(id) {
            const d = trip.find(x => x.id === id);
            const content = document.getElementById('content');
            const mapUrl = `https://maps.google.com/maps?q=${encodeURIComponent(d.map)}&t=&z=13&ie=UTF8&iwloc=&output=embed`;

            content.innerHTML = `
                <div class="day-header">
                    <div style="font-size: 0.8em; color: var(--aurora-g); font-weight: 700;">${d.date}</div>
                    <h2 class="day-main-title">${d.title}</h2>
                    <div style="color: var(--muted); margin-bottom: 20px;">🏠 לינה: ${d.stay}</div>
                </div>

                <div class="cards-grid">
                    <div class="info-card">
                        <span class="card-label">🚗 נסיעה (${d.km} ק״מ)</span>
                        <p>${d.drive}</p>
                    </div>
                    <div class="info-card">
                        <span class="card-label">🎯 אטרקציה מרכזית</span>
                        <p>${d.main}</p>
                    </div>
                    <div class="info-card card-wide">
                        <span class="card-label">✨ דגש לבנות (4 ו-8)</span>
                        <p>${d.kids}</p>
                    </div>
                </div>

                <div class="map-container">
                    <iframe width="100%" height="100%" frameborder="0" src="${mapUrl}"></iframe>
                </div>
            `;

            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            content.scrollTo(0,0);
        }

        function updateBudget() {
            const totalNok = trip.reduce((sum, day) => sum + day.cost, 0);
            document.getElementById('budget-nok-total').textContent = totalNok.toLocaleString() + ' NOK';
            document.getElementById('budget-ils-total').textContent = '≈ ₪' + Math.round(totalNok * 0.34).toLocaleString();
        }

        window.onload = () => {
            renderSidebar();
            loadDay(1);
            updateBudget();
        };
    </script>
</body>
</html>
