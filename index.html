        .card-text { padding: 16px; font-size: 0.9em; line-height: 1.6; }

    let currentDayId = null;
    let lastPercent = -1;

    function storageKey(id) { return `norway26-day-${id}`; }

    function updateProgress() {
        const done = trip.filter(d => localStorage.getItem(storageKey(d.id))).length;
        const pct = Math.round((done / trip.length) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-pct').textContent = pct + '%';
        if (lastPercent !== -1 && pct === 100 && lastPercent < 100) triggerConfetti();
        lastPercent = pct;
    }

    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = Array.from({ length: 100 }, () => ({ x: Math.random() * canvas.width, y: -20, r: 5+Math.random()*5, color: '#00c9a7' }));
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); p.y += 3; });
            if (pieces[0].y < canvas.height) requestAnimationFrame(draw);
        }
        draw();
    }

    function openImageModal(src) {
        document.getElementById('modal-img').src = src;
        document.getElementById('image-modal').classList.add('open');
    }
    function closeImageModal() { document.getElementById('image-modal').classList.remove('open'); }

    function loadDay(id) {
        currentDayId = id;
        const d = trip.find(x => x.id === id);
        const content = document.getElementById('content');
        const isDone = localStorage.getItem(storageKey(id)) ? 'checked' : '';

        document.querySelectorAll('.day-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + id).classList.add('active');

        content.innerHTML = `
            <div class="day-header fade-up">
                <h2>יום ${d.id}: ${d.title}</h2>
                <p style="color:var(--glacier); margin-bottom:15px;">🏠 לינה: ${d.stay} | 📅 תאריך: ${d.date}</p>
                <label style="background:rgba(0,201,167,0.1); padding:10px 15px; border-radius:10px; cursor:pointer; display:inline-block;">
                    <input type="checkbox" onchange="toggleDone(${d.id}, this.checked)" ${isDone}> סמנו כיום שהושלם
                </label>
            </div>

            <div class="cards-grid">
                <div class="info-card">
                    <div class="card-img" onclick="openImageModal('${d.imgD}')"><img src="${d.imgD}" onload="this.parentElement.classList.add('loaded')"></div>
                    <div class="card-text"><strong>יומן דרכים:</strong><br>${d.drive}</div>
                </div>
                <div class="info-card">
                    <div class="card-img" onclick="openImageModal('${d.imgM}')"><img src="${d.imgM}" onload="this.parentElement.classList.add('loaded')"></div>
                    <div class="card-text"><strong>אטרקציה מרכזית:</strong><br>${d.main}</div>
                </div>
                <div class="info-card card-wide">
                    <div class="card-img" style="height:250px;" onclick="openImageModal('${d.imgK}')"><img src="${d.imgK}" onload="this.parentElement.classList.add('loaded')"></div>
                    <div class="card-text"><strong>דגש לעמליה וגילי:</strong><br>${d.kids}</div>
                </div>
            </div>

            <div class="links-card">
                <p style="font-weight:bold; margin-bottom:10px; color:var(--aurora-b);">🔗 קישורים להזמנה ומידע רשמי:</p>
                ${d.links.map(l => `<a href="${l.url}" target="_blank" class="external-link-btn">${l.title} ↗</a>`).join('')}
            </div>
        `;
        content.scrollTo(0,0);
    }

    function toggleDone(id, checked) {
        if (checked) localStorage.setItem(storageKey(id), 'true');
        else localStorage.removeItem(storageKey(id));
        document.getElementById('btn-' + id).style.opacity = checked ? '0.5' : '1';
        updateProgress();
    }

    const sidebar = document.getElementById('sidebar');
    trip.forEach(d => {
        const btn = document.createElement('div');
        btn.className = 'day-btn';
        btn.id = 'btn-' + d.id;
        btn.innerHTML = `<strong>יום ${d.id}</strong><br><span style="font-size:0.8em; opacity:0.7;">${d.date}</span>`;
        if (localStorage.getItem(storageKey(d.id))) btn.style.opacity = '0.5';
        btn.onclick = () => loadDay(d.id);
        sidebar.appendChild(btn);
    });

    updateProgress();
    loadDay(1);
</script>
